apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: payment-platform-ingress
  namespace: default
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "8m"
spec:
  rules:
  - host: api.paymentplatform.com
    http:
      paths:
      - path: /v1
        pathType: Prefix
        backend:
          service:
            name: payment-core-service
            port:
              number: 3001
      - path: /webhooks
        pathType: Prefix
        backend:
          service:
            name: payment-core-service
            port:
              number: 3001
